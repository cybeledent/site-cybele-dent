<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>CybèleGestion — Cabinet dentaire</title>
  <link rel="icon" href="../assets/logo.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="app.css?v=2">
  <link rel="stylesheet" href="personnel.css?v=1">
</head>
<body data-module="equipements">

  <!-- En-tête commun -->
  <header class="app-header">
    <div class="app-header-inner">
      <a class="brand" href="#" id="brand-home">
        <span class="brand-mark">🦷</span>
        <span class="brand-text">Cybèle<strong>Gestion</strong></span>
      </a>

      <nav class="module-nav">
        <button class="module-tab active" data-module-tab="equipements">🔧 Équipements</button>
        <button class="module-tab" data-module-tab="personnel">👥 Personnel</button>
      </nav>

      <div class="header-actions">
        <button class="btn-icon" id="btn-help" title="Aide">?</button>
        <button class="btn-ghost-sm" id="btn-export" title="Sauvegarder toutes mes données">⬇ Sauvegarde</button>
        <button class="btn-ghost-sm" id="btn-import" title="Restaurer une sauvegarde">⬆ Restaurer</button>
        <input type="file" id="import-file" accept="application/json" hidden>
      </div>
    </div>
  </header>

  <!-- Module Équipements -->
  <main id="app" class="app-main module-panel" data-module-panel="equipements"><!-- rendu dynamique --></main>

  <!-- Module Personnel -->
  <main id="app-personnel" class="app-main module-panel" data-module-panel="personnel" hidden><!-- rendu dynamique --></main>

  <!-- Conteneur des fenêtres modales (partagé) -->
  <div id="modal-root"></div>

  <!-- Firebase SDK (compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="firebase-db.js?v=1"></script>
  <!-- Modules -->
  <script src="shell.js?v=1"></script>
  <script src="app.js?v=3"></script>
  <script src="personnel.js?v=2"></script>
</body>
</html>
